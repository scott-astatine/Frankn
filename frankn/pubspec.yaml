name: frankn
description: "Client for Frankn"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_webrtc: ^1.2.0
  web_socket: ^1.0.1
  web_socket_channel: ^3.0.3
  uuid: ^4.5.2
  json_annotation: ^4.9.0
  crypto: ^3.0.7
  hex: ^0.2.0
  argon2: ^1.0.1
  pointycastle: ^3.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_foreground_task: ^9.2.0
  volume_controller: ^3.4.1
  file_picker: ^10.3.8
  awesome_notifications: ^0.11.0
  audio_service: ^0.18.18
  just_audio: ^0.10.5
  dartssh2: ^2.13.0
  xterm: ^4.0.0
  device_info_plus: ^12.3.0
  open_filex: ^4.7.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  mobile_scanner: ^7.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMonoNerdFont
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFont-Regular.ttf
